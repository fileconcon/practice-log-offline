<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="練習ログ">
<meta name="theme-color" content="#0a0e0a">
<title>🎱 練習ログ</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e0a;--surface:#161b16;--surface2:#1f261f;
  --border:#2a332a;--border2:#3a463a;
  --text:#ffffff;--text2:#a8b3a8;--text3:#5f6b5f;
  --accent:#3ddc84;--accent2:#cc4444;--accent3:#7af0a8;
  --radius:8px;--radius-sm:5px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Oswald',sans-serif;font-size:15px;overscroll-behavior:none;}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;}
#header{padding:52px 20px 12px;border-bottom:2px solid var(--accent);flex-shrink:0;background:linear-gradient(180deg,#121712 0%,#0a0e0a 100%);}
#header-row{display:flex;justify-content:space-between;align-items:center;}
#header-title{font-size:23px;font-weight:700;letter-spacing:1px;color:var(--accent);}
#header-date{font-size:18px;color:var(--accent);font-family:'DM Mono',monospace;font-weight:500;}
#header-day{font-size:15px;color:var(--text2);}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px 110px;}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(10,14,10,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:2px solid var(--accent);display:flex;padding:6px 4px max(14px,env(safe-area-inset-bottom));z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border:none;background:transparent;color:var(--text3);font-family:'Oswald',sans-serif;font-size:11px;font-weight:500;cursor:pointer;border-radius:var(--radius-sm);letter-spacing:0.5px;}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:20px;line-height:1;}
.screen{display:none;}
.screen.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);padding:13px 14px;margin-bottom:11px;}
.card-label{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:9px;}
.cat-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px;scrollbar-width:none;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-tab{flex-shrink:0;padding:8px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.cat-tab.active{background:rgba(61,220,132,0.18);border-color:var(--accent);color:var(--accent);}
.ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.ex-btn{padding:13px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-family:'Oswald',sans-serif;font-size:14px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.15s;line-height:1.3;}
.ex-btn.selected{background:var(--accent);border-color:var(--accent);color:#0a0e0a;font-weight:700;}
.ex-btn:active{transform:scale(0.97);}
.chip-row{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:11px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-family:'DM Mono',monospace;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.chip.selected{background:rgba(61,220,132,0.18);border-color:var(--accent);color:var(--accent);}
.chip:active{transform:scale(0.95);}
.custom-row{display:flex;gap:8px;margin-top:9px;align-items:center;}
.custom-row input{flex:1;padding:11px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Mono',monospace;font-size:15px;font-weight:700;outline:none;}
.custom-row input:focus{border-color:var(--accent);}
.mini-btn{padding:11px 18px;background:linear-gradient(135deg,#3ddc84,#2bb56a);border:none;border-radius:var(--radius);color:#0a0e0a;font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0;}
.memo-input{width:100%;padding:11px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Oswald',sans-serif;font-size:14px;outline:none;resize:none;line-height:1.5;}
.memo-input:focus{border-color:var(--accent);}
.add-btn{width:100%;padding:15px;background:linear-gradient(135deg,#3ddc84,#2bb56a);border:none;border-radius:var(--radius);color:#0a0e0a;font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:1px;}
.add-btn:disabled{background:var(--surface2);color:var(--text3);}
.add-btn:active:not(:disabled){filter:brightness(0.9);}
.badge{display:inline-block;padding:2px 9px;border-radius:var(--radius);font-size:11px;font-weight:700;font-family:'DM Mono',monospace;background:rgba(61,220,132,0.18);color:var(--accent);}
.log-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;}
.log-row:last-child{border-bottom:none;}
.log-main{flex:1;min-width:0;}
.log-title{font-size:14px;font-weight:600;}
.log-sub{font-size:12px;color:var(--text3);margin-top:3px;line-height:1.4;}
.log-min{color:var(--accent);font-family:'DM Mono',monospace;font-weight:700;font-size:13px;margin-right:6px;}
.del-btn{flex-shrink:0;padding:6px 10px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text3);font-size:12px;cursor:pointer;}
.del-btn:active{border-color:var(--accent2);color:var(--accent2);}
.edit-btn{flex-shrink:0;padding:6px 10px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-size:12px;cursor:pointer;}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;line-height:1.6;}
.info-row{display:flex;gap:10px;margin-bottom:11px;}
.info-box{flex:1;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);padding:11px 13px;}
.info-box .k{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1px;}
.info-box .v{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;margin-top:3px;}
.form-label{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:6px;}
.form-input{width:100%;padding:11px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Oswald',sans-serif;font-size:14px;outline:none;margin-bottom:10px;}
.form-input:focus{border-color:var(--accent);}
select.form-input{appearance:none;-webkit-appearance:none;cursor:pointer;}
.section-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.manage-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:10px;}
.manage-row:last-child{border-bottom:none;}
.ai-copy-btn{width:100%;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Oswald',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:0.5px;}
.ai-copy-btn:active{border-color:var(--accent);}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:var(--radius-sm);cursor:pointer;position:relative;}
.cal-day.empty{cursor:default;}
.cal-day.has-log{background:rgba(61,220,132,0.15);border:1px solid rgba(61,220,132,0.3);}
.cal-day.today{border:1.5px solid var(--accent2);}
.cal-day.selected{background:rgba(61,220,132,0.35)!important;border-color:var(--accent)!important;}
.cal-day-num{font-size:13px;font-weight:600;color:var(--text2);line-height:1;}
.cal-day.has-log .cal-day-num{color:var(--text);}
.cal-min{font-size:9px;font-family:'DM Mono',monospace;font-weight:700;color:var(--accent);margin-top:2px;line-height:1;}
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-10px);background:linear-gradient(135deg,#3ddc84,#2bb56a);color:#0a0e0a;font-size:14px;font-weight:700;padding:9px 22px;border-radius:var(--radius);opacity:0;pointer-events:none;transition:all 0.2s;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes float-up{0%{transform:translate(-50%,0) scale(0.8);opacity:0;}20%{transform:translate(-50%,-12px) scale(1.1);opacity:1;}100%{transform:translate(-50%,-80px) scale(1);opacity:0;}}
.float-text{position:fixed;z-index:9999;pointer-events:none;font-weight:700;font-size:22px;color:var(--accent);text-shadow:0 2px 10px rgba(61,220,132,0.7),0 0 4px #000;animation:float-up 1.1s ease-out forwards;white-space:nowrap;}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* 練習セッション経過バー（ヘッダー直下） */
#session-bar{display:none;padding:8px 14px 12px;flex-shrink:0;}
#session-bar.show{display:block;}
#session-bar .sb-track{position:relative;height:26px;border-radius:13px;background:var(--surface2);overflow:hidden;border:1px solid var(--border);}
#session-bar .sb-fill{position:absolute;top:0;left:0;height:100%;width:0%;background:var(--accent);transition:width .3s ease,background .3s;}
#session-bar.warn .sb-fill{background:#fb923c;}
#session-bar.over .sb-fill{background:#f87171;}
#session-bar .sb-text{position:absolute;top:0;left:0;right:0;height:100%;display:flex;justify-content:space-between;align-items:center;padding:0 14px;font-size:12px;font-weight:700;letter-spacing:.5px;box-sizing:border-box;white-space:nowrap;}
#session-bar .sb-base{color:var(--text2);}
#session-bar .sb-clip{position:absolute;top:0;left:0;height:100%;width:0%;overflow:hidden;}
#session-bar .sb-clip .sb-text{color:#0a0e0a;}
#session-bar .sb-val{font-family:'DM Mono',monospace;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-row">
      <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;">
        <div id="header-title">🎱 練習ログ</div>
        <div style="display:flex;align-items:baseline;gap:6px;">
          <div id="header-date"></div><div id="header-day"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="session-bar">
    <div class="sb-track">
      <div class="sb-fill" id="sb-fill"></div>
      <div class="sb-text sb-base"><span>⏱ 練習時間</span><span><span class="sb-val" id="sb-val">0分</span> / 90分</span></div>
      <div class="sb-clip" id="sb-clip"><div class="sb-text"><span>⏱ 練習時間</span><span><span class="sb-val" id="sb-val2">0分</span> / 90分</span></div></div>
    </div>
  </div>

  <div id="content">
    <!-- ============ 記録 ============ -->
    <div id="screen-record" class="screen active">
      <div class="info-row">
        <div class="info-box"><div class="k">今日の練習</div><div class="v" id="today-count">0回</div></div>
        <div class="info-box"><div class="k">今日の合計</div><div class="v" id="today-min">0分</div></div>
      </div>

      <select class="form-input" id="routine-pick" style="margin-bottom:11px;" onchange="startRoutine()">
        <option value="">🔁 ルーティンを選んで開始</option>
      </select>
      <div id="routine-progress" class="card" style="display:none;border-left-color:var(--accent3);">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
          <div style="flex:1;min-width:0;"><div class="card-label" style="margin-bottom:2px;">🔁 ルーティン実行中</div><div id="routine-progress-text" style="font-size:14px;font-weight:600;"></div><div id="routine-note" style="font-size:11px;color:var(--text3);margin-top:4px;line-height:1.4;"></div></div>
          <button class="del-btn" onclick="cancelRoutine()">中止</button>
        </div>
      </div>

      <div class="card">
        <div class="card-label">種別（大項目）</div>
        <div class="cat-scroll" id="cat-tabs"></div>
        <div class="card-label" style="margin-top:4px;">種目（小項目）</div>
        <div class="ex-grid" id="ex-grid"></div>
      </div>

      <div id="record-panel" style="display:none;">
        <div class="card" id="tip-card" style="display:none;background:var(--accent);border:none;">
          <div class="card-label" style="color:#0a0e0a;">💡 ワンポイント</div>
          <div id="tip-text" style="color:#0a0e0a;font-weight:600;font-size:14px;line-height:1.55;"></div>
        </div>
        <div class="card" id="past-card" style="display:none;border-left-color:var(--accent3);">
          <div class="card-label">📝 前回の気づき（この種目）</div>
          <div id="past-list" style="font-size:13px;line-height:1.5;"></div>
        </div>
        <div class="card" id="timer-card">
          <div class="card-label">⏱ タイマー計測</div>
          <div id="timer-display" style="font-size:38px;font-family:'DM Mono',monospace;font-weight:700;text-align:center;letter-spacing:1px;margin:4px 0 12px;">00:00</div>
          <button class="add-btn" id="timer-btn" onclick="toggleTimer()">▶ 開始</button>
          <div id="timer-hint" style="font-size:11px;color:var(--text3);text-align:center;margin-top:8px;">押すと計測開始。■終了で実測時間＋メモを記録するよ。</div>
        </div>
        <div class="card" id="manual-time-card">
          <div class="card-label">練習時間（分）— 手動入力</div>
          <div class="chip-row" id="min-chips"></div>
          <div class="custom-row">
            <input type="number" id="custom-min" placeholder="直接入力 分" min="1" max="600" step="5">
            <button class="mini-btn" onclick="setCustomMin()">OK</button>
          </div>
        </div>
        <div class="card">
          <div class="card-label">気づき・メモ（任意）</div>
          <textarea class="memo-input" id="memo" rows="2" placeholder="例: 引き玉のフォロースルーが甘かった"></textarea>
        </div>
        <button class="add-btn" id="save-btn" disabled onclick="saveLog()">時間を選んでね</button>
      </div>

      <div class="card" style="margin-top:14px;">
        <div class="section-row">
          <span class="card-label" style="margin-bottom:0;">今日の記録</span>
          <span class="badge" id="today-badge">0件</span>
        </div>
        <div id="today-list"><div class="empty-state">まだ記録がないよ</div></div>
      </div>
    </div>

    <!-- ============ 履歴 ============ -->
    <div id="screen-history" class="screen">
      <div style="display:flex;gap:6px;margin-bottom:10px;">
        <button class="cat-tab active" id="htab-cal" onclick="setHistTab('cal')" style="flex:1;text-align:center;">📅 カレンダー</button>
        <button class="cat-tab" id="htab-ins" onclick="setHistTab('ins')" style="flex:1;text-align:center;">📝 気づき</button>
      </div>
      <div id="hist-ins" style="display:none;">
        <div class="card">
          <div class="card-label">🔍 種目で絞る</div>
          <select class="form-input" id="ins-filter" style="margin-bottom:0;" onchange="renderInsights()"></select>
        </div>
        <div id="ins-list"></div>
      </div>
      <div id="hist-cal">
      <div class="card" style="padding:16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <button onclick="changeMonth(-1)" style="background:transparent;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px 12px;">‹</button>
          <div id="cal-month" style="font-size:15px;font-weight:600;font-family:'DM Mono',monospace;"></div>
          <button onclick="changeMonth(1)" style="background:transparent;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px 12px;">›</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;">
          <div style="text-align:center;font-size:11px;color:var(--text3);">日</div><div style="text-align:center;font-size:11px;color:var(--text3);">月</div><div style="text-align:center;font-size:11px;color:var(--text3);">火</div><div style="text-align:center;font-size:11px;color:var(--text3);">水</div><div style="text-align:center;font-size:11px;color:var(--text3);">木</div><div style="text-align:center;font-size:11px;color:var(--text3);">金</div><div style="text-align:center;font-size:11px;color:var(--text3);">土</div>
        </div>
        <div id="cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;"></div>
        <div class="info-row" style="margin-top:14px;margin-bottom:0;">
          <div class="info-box"><div class="k">今月の練習</div><div class="v" id="month-count">0回</div></div>
          <div class="info-box"><div class="k">今月の合計</div><div class="v" id="month-min">0分</div></div>
        </div>
      </div>

      <div id="day-detail" style="display:none;">
        <div class="card">
          <div class="section-row">
            <div id="day-label" style="font-size:14px;font-weight:600;"></div>
            <div id="day-badge" class="badge"></div>
          </div>
          <div id="day-body"></div>
        </div>
        <button class="ai-copy-btn" onclick="copyDayForAI()"><span>📋</span> この日の記録をコピー（AI評価用）</button>
      </div>

      <button class="ai-copy-btn" onclick="copyMonthForAI()" style="margin-top:12px;"><span>📊</span> 今月の記録をコピー（AI総評用）</button>
      </div>
    </div>

    <!-- ============ 種別管理 ============ -->
    <div id="screen-manage" class="screen">
      <div class="card">
        <div class="card-label">大項目を追加</div>
        <div class="custom-row" style="margin-top:0;">
          <input class="form-input" id="new-cat" type="text" placeholder="例: メンタル" style="margin-bottom:0;">
          <button class="mini-btn" onclick="addCat()">追加</button>
        </div>
        <div id="cat-manage" style="margin-top:12px;"></div>
      </div>

      <div class="card">
        <div class="card-label">小項目を追加</div>
        <div class="form-label">どの大項目に？</div>
        <select class="form-input" id="item-cat-pick"></select>
        <input class="form-input" id="new-item" type="text" placeholder="種目名（例: ジャンプショット）">
        <textarea class="form-input" id="new-item-tip" rows="2" placeholder="ワンポイントアドバイス（任意）"></textarea>
        <button class="add-btn" onclick="addItem()">追加する</button>
      </div>

      <div class="card">
        <div class="card-label">🔁 ルーティンを作る</div>
        <input class="form-input" id="new-routine-name" type="text" placeholder="例: ウォームアップ">
        <div style="font-size:11px;color:var(--text3);margin:2px 0 6px;">種目をタップで追加（タップした順＝実施順）</div>
        <div id="routine-picker" class="ex-grid" style="margin-bottom:8px;"></div>
        <div id="routine-order" style="font-size:13px;color:var(--text2);line-height:1.9;margin-bottom:10px;"></div>
        <textarea class="form-input" id="new-routine-note" rows="2" placeholder="出典・ねらい（任意）"></textarea>
        <button class="add-btn" onclick="saveRoutine()">ルーティンを保存</button>
        <div id="routine-list" style="margin-top:14px;"></div>
      </div>

      <div class="card">
        <div class="card-label">登録済みの種別</div>
        <div id="item-manage"></div>
      </div>
    </div>
  </div>

  <nav id="nav">
    <button class="nav-btn active" id="nav-record" onclick="showScreen('record')"><span class="nav-icon">⚡</span>記録</button>
    <button class="nav-btn" id="nav-history" onclick="showScreen('history')"><span class="nav-icon">📈</span>履歴</button>
    <button class="nav-btn" id="nav-manage" onclick="showScreen('manage')"><span class="nav-icon">⚙️</span>種別管理</button>
  </nav>
</div>
<div id="toast"></div>

<script>
// ===== オフライン版：localStorage に保存（端末ごとに完結。スマホ⇔PC同期はなし）=====
const STORE_KEY="poollog_offline_v1";
const TABLE="poollog";
function _load(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||"[]");}catch(e){return [];}}
function _save(rows){localStorage.setItem(STORE_KEY,JSON.stringify(rows));}
function _nextId(rows){return rows.reduce((m,r)=>Math.max(m,r.id||0),0)+1;}
// Supabase互換の最小ラッパー。db.from(...).select()/insert()/update().eq()/delete().eq()/.in()/.order().single()
function from(_table){
  let _rows=_load();
  let _filters=[];
  const apply=()=>_rows.filter(r=>_filters.every(f=>f(r)));
  const api={
    select(){return api;},
    order(field,opt){const asc=!(opt&&opt.ascending===false);const rows=apply().slice().sort((a,b)=>{const av=field==="id"?a.id:(a[field]??"");const bv=field==="id"?b.id:(b[field]??"");if(av<bv)return asc?-1:1;if(av>bv)return asc?1:-1;return 0;});_rows=rows;_filters=[];return Promise.resolve({data:rows,error:null});},
    eq(field,val){_filters.push(r=>(field==="id"?r.id:r[field])==val);return api;},
    in(field,vals){const set=new Set(vals.map(String));_filters.push(r=>set.has(String(field==="id"?r.id:r[field])));return api;},
    async single(){const r=apply()[0]||null;return {data:r,error:r?null:{message:"not found"}};},
    insert(payload){const all=_load();const arr=Array.isArray(payload)?payload:[payload];const created=arr.map(p=>({id:_nextId(all),created_at:new Date().toISOString(),type:p.type,date:p.date||null,data:p.data||{}}));all.push(...created);_save(all);const result={data:created,error:null};return Object.assign(Promise.resolve(result),{select:()=>Object.assign(Promise.resolve(result),{single:()=>Promise.resolve({data:created[0],error:null})})});},
    update(patch){const all=_load();const touched=[];for(const r of all){if(_filters.every(f=>f(r))){Object.assign(r,patch);touched.push(r);}}_save(all);return Object.assign(Promise.resolve({data:touched,error:null}),{eq:(f,v)=>{_filters.push(r=>(f==="id"?r.id:r[f])==v);const all2=_load();const t2=[];for(const r of all2){if(_filters.every(f2=>f2(r))){Object.assign(r,patch);t2.push(r);}}_save(all2);return Promise.resolve({data:t2,error:null});}});},
    delete(){const next=_load().filter(r=>!_filters.every(f=>f(r)));_save(next);return Object.assign(Promise.resolve({data:null,error:null}),{eq:(f,v)=>{_filters.push(r=>(f==="id"?r.id:r[f])==v);const n=_load().filter(r=>!_filters.every(f2=>f2(r)));_save(n);return Promise.resolve({data:null,error:null});},in:(f,vals)=>{const s=new Set(vals.map(String));_filters.push(r=>s.has(String(f==="id"?r.id:r[f])));const n=_load().filter(r=>!_filters.every(f2=>f2(r)));_save(n);return Promise.resolve({data:null,error:null});}});},
  };
  return api;
}
const db={from};

const MIN_PRESETS=[5,10,15,30,45,60,90,120];
const DEFAULTS={
  "基礎":["センターショット","ストップショット","フォロー（押し）","ドロー（引き）","フリ（カット）","直進性チェック"],
  "出し（ポジション）":["ライン出し","スピードコントロール","1クッション出し","L字パターン"],
  "実戦":["9ボール ゴースト戦","フルラック取り切り","ボーラード","14-1"],
  "守備・特殊":["セーフティ","キックショット","バンクショット","クラスター処理"],
  "ブレイク":["ブレイク練習"],
  "その他":["フリー練習","試合"],
};

// 各種目のワンポイントアドバイス（Web情報を凝縮）
const TIPS={
  "センターショット":"手球の真芯を撞き、キューは肘の真下でまっすぐ長くフォロースルー。グリップは軽く握り、突いた後に引き戻さない。",
  "ストップショット":"中心撞き＋十分なスピードで、的球に当たる瞬間に手球の前進回転がゼロになる状態を作る。距離が近いほど撞点をほんの少し下げる。",
  "フォロー（押し）":"中心の1チップ上を撞けば十分（上げ過ぎない）。同じテンポで突き抜き、トップスピンで手球を前へ転がす。",
  "ドロー（引き）":"中心の1チップ下を中速で。キューを水平に保ち、すくい上げずに水平へ長く突き抜く。引き手の力みが最大の敵。",
  "フリ（カット）":"手球が触れるべき位置=ゴーストボールを描き、その中心へ真っ直ぐ撞く。狙うのは的球の縁ではなく接触点。薄いほどスピードを足す。",
  "直進性チェック":"ロングレールへ真芯で撞き、戻りのズレを観察。右へ逸れる=グリップ内回り/肘落ち、左=上体の傾き。全ショットの土台。",
  "ライン出し":"点でなく『線』で出しを考える。次球を入れやすい角度に手球を運ぶ。ストップ撞きの手球は90度のタンジェント方向へ走る。",
  "スピードコントロール":"距離は力でなくストロークの長さで調整する。テンポは常に一定。同じ振りで強弱を作る癖をつける。",
  "1クッション出し":"ストップ系の手球はタンジェント(90度)ラインが基準。入射角=反射角で着地点を読み、回転で微調整する。",
  "L字パターン":"タンジェントライン＋フォロー/ドローで縦の移動量を作る。次球への振り分けを90度基準で先に予測する。",
  "9ボール ゴースト戦":"最低3手先まで出しを計画。難しい球は早めに処理し、安全第一の球順で。1ミス=負けの緊張に慣れるのが目的。",
  "フルラック取り切り":"撞く前に1→9番の順路を声に出して言語化。問題球とキーボール（最終形に必要な球）を先に片付ける。",
  "ボーラード":"10球を1フレームとし、出しの一貫性を測る。毎球まったく同じプレショットルーティンで崩れを防ぐ。",
  "14-1":"常に次ラックを割るブレイクボールを確保しておく。クラスターは余裕のあるうちに早めに割る。",
  "セーフティ":"的球かクッションの陰に手球を隠し、相手との距離を作る。薄く当てて的球と手球を同時にコントロールする。",
  "キックショット":"鏡像(ミラー)法で狙う。レールの向こうに的球を反転させた点へ、無回転を基準に撞く。ダイヤを目安に。",
  "バンクショット":"入れたいポケットをレールに鏡像反転した点を狙う。スピードと回転で角度が変わるので、まず無回転を基準にする。",
  "クラスター処理":"当てる球と散る方向を先に予測。可能なら1球入れながら最小限のスピードで割り、散開後の取り切りまで描く。",
  "ブレイク練習":"1番に正確にフルヒットし、手球はテーブル中央で止める。パワーよりミート精度とタイミングを優先。",
  "フリー練習":"課題を1つだけ決めて取り組む。漫然と撞かず、毎回テーマを持つと上達が早い。",
  "試合":"プレショットルーティンを崩さず、目の前の1球だけに集中。前のミスを引きずらないメンタル管理を。",
};

let cats=[],items=[],logs=[],routines=[];
let selCat=null,selItem=null,selMin=null;
let calYear,calMonth,selDay=null;
let activeRoutine=null,routineDraft=[];
let timerStart=null,timerInterval=null;
const TIMER_KEY="poollog_timer";
const isTimerRunning=()=>timerStart!==null;

const $=(id)=>document.getElementById(id);
const todayStr=()=>{const d=new Date();const o=d.getTimezoneOffset();return new Date(d.getTime()-o*60000).toISOString().slice(0,10);};
function esc(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function toast(msg){const t=$("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1600);}
function floatText(txt){const el=document.createElement("div");el.className="float-text";el.textContent=txt;el.style.left="50%";el.style.top="50%";document.body.appendChild(el);setTimeout(()=>el.remove(),1100);}

function setHeaderDate(){
  const d=new Date();const days=["日","月","火","水","木","金","土"];
  $("header-date").textContent=`${d.getMonth()+1}/${d.getDate()}`;
  $("header-day").textContent=`(${days[d.getDay()]})`;
}

function showScreen(s){
  document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(e=>e.classList.remove("active"));
  $("screen-"+s).classList.add("active");
  $("nav-"+s).classList.add("active");
  if(s==="history"){renderCalendar();if($("hist-ins").style.display==="block")renderInsights();}
  if(s==="manage"){renderManage();}
  $("content").scrollTop=0;
}

// ---------- データ読み込み ----------
async function loadAll(){
  const {data,error}=await db.from(TABLE).select("*").order("id",{ascending:true});
  if(error){toast("読込エラー");console.error(error);return;}
  cats=data.filter(r=>r.type==="category").map(r=>({id:r.id,name:r.data.name,order:r.data.order??0}));
  items=data.filter(r=>r.type==="item").map(r=>({id:r.id,cat:r.data.cat,name:r.data.name,tip:r.data.tip||""}));
  logs=data.filter(r=>r.type==="log").map(r=>({id:r.id,date:r.date,cat:r.data.cat,item:r.data.item,minutes:r.data.minutes,memo:r.data.memo||""}));
  routines=data.filter(r=>r.type==="routine").map(r=>({id:r.id,name:r.data.name,items:r.data.items||[],note:r.data.note||""}));
  cats.sort((a,b)=>a.order-b.order||a.id-b.id);
  if(cats.length===0){await seedDefaults();return;}
  // 既定種目でtip未設定のものを自動補填（初回のみ走る）
  const backfill=items.filter(i=>!i.tip&&TIPS[i.name]);
  if(backfill.length){
    await Promise.all(backfill.map(async i=>{
      const tip=TIPS[i.name];i.tip=tip;
      await db.from(TABLE).update({data:{cat:i.cat,name:i.name,tip}}).eq("id",i.id);
    }));
  }
  renderCatTabs();renderMinChips();renderTodaySummary();renderRoutinePicker();
  restoreTimer();
  renderSessionBar();
}

// ===== 練習セッション経過バー：今日「最初に触った時刻」からの壁時計合計 =====
const SESSION_TARGET_MIN=90;   // バー満タン＝90分
const SESSION_WARN_MIN=60;     // 60分でオレンジ
let sessionBarInterval=null;
function sessionKey(){return "poollog_session_start_"+todayStr();}
function markSessionStart(){
  const k=sessionKey();
  if(!localStorage.getItem(k))localStorage.setItem(k,String(Date.now()));
  renderSessionBar();
}
function getCurrentSession(){
  // 今日の記録があれば、その「実開始時刻」(= created_at − 記録分) のうち最も早いものを開始候補に
  const today=todayStr();
  let earliest=null;
  for(const l of logs){
    if(l.date!==today||!l.created_at)continue;
    const start=new Date(l.created_at).getTime()-(l.minutes||0)*60000;
    if(earliest===null||start<earliest)earliest=start;
  }
  const k=sessionKey();
  const stored=localStorage.getItem(k);
  let startMs=stored?Number(stored):null;
  // 記録から逆算した開始のほうが早ければそれを採用
  if(earliest!==null&&(startMs===null||earliest<startMs)){
    startMs=earliest;
    localStorage.setItem(k,String(startMs));
  }
  if(startMs===null)return null;
  return {minutes:Math.max(0,Math.round((Date.now()-startMs)/60000))};
}
function renderSessionBar(){
  const bar=$("session-bar");if(!bar)return;
  const s=getCurrentSession();
  if(!s){
    bar.classList.remove("show","warn","over");
    if(sessionBarInterval){clearInterval(sessionBarInterval);sessionBarInterval=null;}
    return;
  }
  bar.classList.add("show");
  bar.classList.toggle("warn",s.minutes>=SESSION_WARN_MIN&&s.minutes<SESSION_TARGET_MIN);
  bar.classList.toggle("over",s.minutes>=SESSION_TARGET_MIN);
  $("sb-val").textContent=s.minutes+"分";
  $("sb-val2").textContent=s.minutes+"分";
  const pct=Math.min(100,(s.minutes/SESSION_TARGET_MIN)*100);
  $("sb-fill").style.width=pct+"%";
  const clip=$("sb-clip");clip.style.width=pct+"%";
  const track=clip.parentElement;
  clip.firstElementChild.style.width=track.clientWidth+"px";
  if(!sessionBarInterval)sessionBarInterval=setInterval(renderSessionBar,30000);
}

async function seedDefaults(){
  let order=0;
  for(const catName of Object.keys(DEFAULTS)){
    const {data:cr}=await db.from(TABLE).insert({type:"category",data:{name:catName,order:order++}}).select().single();
    for(const itemName of DEFAULTS[catName]){
      await db.from(TABLE).insert({type:"item",data:{cat:cr.id,name:itemName,tip:TIPS[itemName]||""}});
    }
  }
  await loadAll();
}

// ---------- 記録画面 ----------
function renderCatTabs(){
  const box=$("cat-tabs");box.innerHTML="";
  cats.forEach(c=>{
    const b=document.createElement("button");
    b.className="cat-tab"+(selCat===c.id?" active":"");
    b.textContent=c.name;
    b.onclick=()=>{if(isTimerRunning()){toast("計測中だよ。■終了してから切り替えてね");return;}selCat=c.id;selItem=null;updateSaveBtn();renderCatTabs();renderExGrid();};
    box.appendChild(b);
  });
  if(selCat===null&&cats.length){selCat=cats[0].id;box.querySelector(".cat-tab")?.classList.add("active");}
  renderExGrid();
}

function renderExGrid(){
  const box=$("ex-grid");box.innerHTML="";
  const list=items.filter(i=>i.cat===selCat);
  if(!list.length){box.innerHTML='<div class="empty-state" style="grid-column:1/-1;padding:20px;">この大項目に種目がないよ。<br>「種別管理」から追加してね</div>';return;}
  list.forEach(i=>{
    const b=document.createElement("button");
    b.className="ex-btn"+(selItem===i.id?" selected":"");
    b.textContent=i.name;
    b.onclick=()=>{if(isTimerRunning()){toast("計測中だよ。■終了してから切り替えてね");return;}selItem=i.id;markSessionStart();renderExGrid();$("record-panel").style.display="block";
      const tipCard=$("tip-card");
      if(i.tip){$("tip-text").textContent=i.tip;tipCard.style.display="block";}else{tipCard.style.display="none";}
      renderPastMemos(i.name);
      updateSaveBtn();$("record-panel").scrollIntoView({behavior:"smooth",block:"nearest"});};
    box.appendChild(b);
  });
}

function renderMinChips(){
  const box=$("min-chips");box.innerHTML="";
  MIN_PRESETS.forEach(m=>{
    const b=document.createElement("button");
    b.className="chip"+(selMin===m?" selected":"");
    b.textContent=m;
    b.onclick=()=>{selMin=m;$("custom-min").value="";renderMinChips();updateSaveBtn();};
    box.appendChild(b);
  });
}
function setCustomMin(){
  const v=parseInt($("custom-min").value,10);
  if(!v||v<=0){toast("分を入力してね");return;}
  selMin=v;renderMinChips();updateSaveBtn();
}
function updateSaveBtn(){
  const btn=$("save-btn");
  const ok=selCat!==null&&selItem!==null&&selMin;
  btn.disabled=!ok;
  btn.textContent=ok?`記録する（${selMin}分）`:(selItem===null?"種目を選んでね":"時間を選んでね");
}

async function saveEntry(minutes){
  if(selCat===null||selItem===null||!minutes)return false;
  markSessionStart();
  const catName=cats.find(c=>c.id===selCat)?.name||"";
  const itemName=items.find(i=>i.id===selItem)?.name||"";
  const {error}=await db.from(TABLE).insert({type:"log",date:todayStr(),data:{cat:catName,item:itemName,minutes,memo:$("memo").value.trim()}});
  if(error){toast("保存エラー😣");return false;}
  floatText(`+${minutes}分 🎱`);toast("記録したよ！👏");
  $("memo").value="";
  await loadAll();
  if(activeRoutine)setTimeout(advanceRoutine,250);
  return true;
}
async function saveLog(){
  if(selCat===null||selItem===null||!selMin)return;
  const btn=$("save-btn");btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  const ok=await saveEntry(selMin);
  btn.disabled=false;updateSaveBtn();
  if(ok){selMin=null;renderMinChips();updateSaveBtn();}
}

// ---------- タイマー ----------
function fmtElapsed(ms){
  const s=Math.floor(ms/1000);const m=Math.floor(s/60);const sec=s%60;
  return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
function tickTimer(){if(timerStart!==null){$("timer-display").textContent=fmtElapsed(Date.now()-timerStart);renderSessionBar();}}
function setTimerUI(running){
  const btn=$("timer-btn");
  if(running){
    btn.textContent="■ 終了して記録";
    btn.style.background="linear-gradient(135deg,#cc4444,#a83333)";btn.style.color="#fff";
    $("manual-time-card").style.display="none";
    $("save-btn").style.display="none";
    $("timer-hint").textContent="計測中…メモは今書いてもOK。■終了で記録するよ。";
  }else{
    btn.textContent="▶ 開始";
    btn.style.background="";btn.style.color="";
    $("manual-time-card").style.display="block";
    $("save-btn").style.display="block";
    $("timer-display").textContent="00:00";
    $("timer-hint").textContent="押すと計測開始。■終了で実測時間＋メモを記録するよ。";
  }
}
async function toggleTimer(){
  if(!isTimerRunning()){
    if(selCat===null||selItem===null){toast("先に種目を選んでね");return;}
    timerStart=Date.now();
    localStorage.setItem(TIMER_KEY,JSON.stringify({catId:selCat,itemId:selItem,startMs:timerStart}));
    markSessionStart();
    setTimerUI(true);tickTimer();
    timerInterval=setInterval(tickTimer,1000);
  }else{
    const elapsed=Date.now()-timerStart;
    const minutes=Math.max(1,Math.round(elapsed/60000));
    clearInterval(timerInterval);timerInterval=null;
    const startedAt=timerStart;timerStart=null;
    localStorage.removeItem(TIMER_KEY);
    const btn=$("timer-btn");btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
    const ok=await saveEntry(minutes);
    btn.disabled=false;
    if(!ok){timerStart=startedAt;localStorage.setItem(TIMER_KEY,JSON.stringify({catId:selCat,itemId:selItem,startMs:startedAt}));timerInterval=setInterval(tickTimer,1000);setTimerUI(true);tickTimer();return;}
    setTimerUI(false);
  }
}
function restoreTimer(){
  const raw=localStorage.getItem(TIMER_KEY);if(!raw)return;
  let t;try{t=JSON.parse(raw);}catch(e){localStorage.removeItem(TIMER_KEY);return;}
  if(!cats.find(c=>c.id===t.catId)||!items.find(i=>i.id===t.itemId)){localStorage.removeItem(TIMER_KEY);return;}
  selCat=t.catId;selItem=t.itemId;timerStart=t.startMs;
  renderCatTabs();
  const it=items.find(i=>i.id===t.itemId);
  $("record-panel").style.display="block";
  if(it.tip){$("tip-text").textContent=it.tip;$("tip-card").style.display="block";}
  renderPastMemos(it.name);
  setTimerUI(true);tickTimer();
  timerInterval=setInterval(tickTimer,1000);
}

function renderTodaySummary(){
  const t=todayStr();
  const today=logs.filter(l=>l.date===t);
  $("today-count").textContent=today.length+"回";
  $("today-min").textContent=today.reduce((s,l)=>s+(l.minutes||0),0)+"分";
  $("today-badge").textContent=today.length+"件";
  const box=$("today-list");
  if(!today.length){box.innerHTML='<div class="empty-state">まだ記録がないよ</div>';return;}
  box.innerHTML="";
  today.slice().reverse().forEach(l=>box.appendChild(logRow(l)));
}

function logRow(l){
  const row=document.createElement("div");row.className="log-row";
  row.innerHTML=`<div class="log-main">
    <div class="log-title"><span class="log-min">${l.minutes}分</span>${esc(l.cat)} / ${esc(l.item)}</div>
    ${l.memo?`<div class="log-sub">📝 ${esc(l.memo)}</div>`:""}
  </div>`;
  const del=document.createElement("button");del.className="del-btn";del.textContent="削除";
  del.onclick=async()=>{if(!confirm("この記録を削除する？"))return;await db.from(TABLE).delete().eq("id",l.id);await loadAll();if($("screen-history").classList.contains("active"))renderCalendar();};
  row.appendChild(del);
  return row;
}

// ---------- ルーティン実行 ----------
function renderRoutinePicker(){
  const sel=$("routine-pick");const cur=sel.value;
  sel.innerHTML='<option value="">🔁 ルーティンを選んで開始</option>';
  routines.forEach(r=>{const o=document.createElement("option");o.value=r.id;o.textContent=`🔁 ${r.name}（${r.items.length}種目）`;sel.appendChild(o);});
  sel.value=activeRoutine?"":cur;
}
function startRoutine(){
  const id=Number($("routine-pick").value);if(!id)return;
  if(isTimerRunning()){toast("計測中だよ。■終了してからね");$("routine-pick").value="";return;}
  const r=routines.find(x=>x.id===id);if(!r)return;
  const queue=r.items.filter(iid=>items.find(i=>i.id===iid));
  if(!queue.length){toast("この中の種目が無いみたい");return;}
  activeRoutine={name:r.name,items:queue,pos:0,note:r.note};
  $("routine-progress").style.display="block";
  $("routine-note").textContent=r.note||"";
  gotoRoutineStep(0);
}
function gotoRoutineStep(pos){
  const itemId=activeRoutine.items[pos];
  const it=items.find(i=>i.id===itemId);
  selCat=it.cat;selItem=it.id;
  renderCatTabs();
  $("record-panel").style.display="block";
  if(it.tip){$("tip-text").textContent=it.tip;$("tip-card").style.display="block";}else{$("tip-card").style.display="none";}
  renderPastMemos(it.name);
  updateSaveBtn();
  $("routine-progress-text").textContent=`${activeRoutine.name}（${pos+1}/${activeRoutine.items.length}）→ ${it.name}`;
  $("routine-progress").scrollIntoView({behavior:"smooth",block:"nearest"});
}
function advanceRoutine(){
  if(!activeRoutine)return;
  activeRoutine.pos++;
  if(activeRoutine.pos>=activeRoutine.items.length){
    floatText("ルーティン完了！🎉");toast(`「${activeRoutine.name}」完了！お疲れさま👏`);
    cancelRoutine();
  }else{
    gotoRoutineStep(activeRoutine.pos);
  }
}
function cancelRoutine(){
  activeRoutine=null;$("routine-progress").style.display="none";$("routine-pick").value="";
}

// ---------- 前回の気づき ----------
function renderPastMemos(itemName){
  const card=$("past-card"),list=$("past-list");
  const past=logs.filter(l=>l.item===itemName&&l.memo).sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id).slice(0,3);
  if(!past.length){card.style.display="none";return;}
  list.innerHTML=past.map(l=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);"><div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;">${esc(l.date)} ・ ${l.minutes}分</div><div style="margin-top:2px;color:var(--text);">${esc(l.memo)}</div></div>`).join("");
  list.lastElementChild&&(list.lastElementChild.style.borderBottom="none");
  card.style.display="block";
}

// ---------- 履歴: タブ切替 ----------
function setHistTab(t){
  $("hist-cal").style.display=t==="cal"?"block":"none";
  $("hist-ins").style.display=t==="ins"?"block":"none";
  $("htab-cal").classList.toggle("active",t==="cal");
  $("htab-ins").classList.toggle("active",t==="ins");
  if(t==="ins")renderInsights();
}

// ---------- 履歴: 気づき一覧 ----------
function renderInsights(){
  const sel=$("ins-filter");const cur=sel.value;
  const itemsWithMemo=Array.from(new Set(logs.filter(l=>l.memo).map(l=>l.item)));
  sel.innerHTML='<option value="">すべての種目</option>'+itemsWithMemo.sort().map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join("");
  sel.value=cur;
  const filtered=logs.filter(l=>l.memo&&(!cur||l.item===cur)).sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  const box=$("ins-list");
  if(!filtered.length){box.innerHTML='<div class="empty-state">気づきメモが付いた記録はまだないよ</div>';return;}
  box.innerHTML=filtered.map(l=>`<div class="card" style="padding:12px 14px;"><div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;">${esc(l.date)} ・ <span style="color:var(--accent);">${l.minutes}分</span> ・ ${esc(l.cat)} / ${esc(l.item)}</div><div style="margin-top:6px;font-size:14px;line-height:1.5;">${esc(l.memo)}</div></div>`).join("");
}

// ---------- 履歴（カレンダー） ----------
function changeMonth(d){calMonth+=d;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}selDay=null;$("day-detail").style.display="none";renderCalendar();}
function renderCalendar(){
  if(calYear===undefined){const d=new Date();calYear=d.getFullYear();calMonth=d.getMonth();}
  $("cal-month").textContent=`${calYear}年 ${calMonth+1}月`;
  const grid=$("cal-grid");grid.innerHTML="";
  const first=new Date(calYear,calMonth,1).getDay();
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const byDay={};
  let mCount=0,mMin=0;
  logs.forEach(l=>{
    const [y,m]=l.date.split("-").map(Number);
    if(y===calYear&&m===calMonth+1){const day=Number(l.date.split("-")[2]);(byDay[day]=byDay[day]||[]).push(l);mCount++;mMin+=l.minutes||0;}
  });
  $("month-count").textContent=mCount+"回";
  $("month-min").textContent=mMin+"分";
  for(let i=0;i<first;i++){const e=document.createElement("div");e.className="cal-day empty";grid.appendChild(e);}
  const t=todayStr();
  for(let day=1;day<=dim;day++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const dayLogs=byDay[day];
    const el=document.createElement("div");
    el.className="cal-day"+(dayLogs?" has-log":"")+(ds===t?" today":"")+(ds===selDay?" selected":"");
    const min=dayLogs?dayLogs.reduce((s,l)=>s+(l.minutes||0),0):0;
    el.innerHTML=`<div class="cal-day-num">${day}</div>${dayLogs?`<div class="cal-min">${min}</div>`:""}`;
    if(dayLogs)el.onclick=()=>{selDay=ds;renderCalendar();renderDayDetail(ds,dayLogs);};
    grid.appendChild(el);
  }
}
function renderDayDetail(ds,dayLogs){
  $("day-detail").style.display="block";
  const [y,m,d]=ds.split("-");
  $("day-label").textContent=`${Number(m)}月${Number(d)}日`;
  const min=dayLogs.reduce((s,l)=>s+(l.minutes||0),0);
  $("day-badge").textContent=`${dayLogs.length}件 / ${min}分`;
  const body=$("day-body");body.innerHTML="";
  dayLogs.forEach(l=>body.appendChild(logRow(l)));
  $("day-detail").scrollIntoView({behavior:"smooth",block:"nearest"});
}

// ---------- AIコピー ----------
function logsToText(list){
  return list.map(l=>`・${l.cat} / ${l.item}（${l.minutes}分）${l.memo?" — "+l.memo:""}`).join("\n");
}
function copyDayForAI(){
  if(!selDay)return;
  const list=logs.filter(l=>l.date===selDay);
  const min=list.reduce((s,l)=>s+(l.minutes||0),0);
  const txt=`【ビリヤード練習記録】${selDay}\n合計 ${list.length}件 / ${min}分\n\n${logsToText(list)}\n\nこの日の練習内容について、ビリヤードコーチの視点で講評と次回のアドバイスをください。`;
  copyText(txt);
}
function copyMonthForAI(){
  const list=logs.filter(l=>{const[y,m]=l.date.split("-").map(Number);return y===calYear&&m===calMonth+1;}).sort((a,b)=>a.date.localeCompare(b.date));
  if(!list.length){toast("今月の記録がないよ");return;}
  const min=list.reduce((s,l)=>s+(l.minutes||0),0);
  const byCat={};list.forEach(l=>{byCat[l.cat]=(byCat[l.cat]||0)+l.minutes;});
  const catSum=Object.entries(byCat).map(([k,v])=>`${k}: ${v}分`).join(" / ");
  const byDate={};list.forEach(l=>{(byDate[l.date]=byDate[l.date]||[]).push(l);});
  const detail=Object.keys(byDate).sort().map(d=>`■ ${d}\n${logsToText(byDate[d])}`).join("\n\n");
  const txt=`【ビリヤード練習 月次記録】${calYear}年${calMonth+1}月\n練習日数 ${Object.keys(byDate).length}日 / 合計 ${list.length}件 / ${min}分\n部位別: ${catSum}\n\n${detail}\n\n今月の練習量・バランス・継続性をビリヤードコーチの視点で総評し、来月の重点課題を提案してください。`;
  copyText(txt);
}
function copyText(txt){
  navigator.clipboard.writeText(txt).then(()=>toast("コピーしたよ📋")).catch(()=>{
    const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();toast("コピーしたよ📋");
  });
}

// ---------- 種別管理 ----------
function renderManage(){
  // 大項目リスト
  const cm=$("cat-manage");cm.innerHTML="";
  cats.forEach(c=>{
    const row=document.createElement("div");row.className="manage-row";
    row.innerHTML=`<div style="font-size:14px;font-weight:600;">${esc(c.name)} <span style="color:var(--text3);font-size:12px;">(${items.filter(i=>i.cat===c.id).length})</span></div>`;
    const del=document.createElement("button");del.className="del-btn";del.textContent="削除";
    del.onclick=async()=>{if(!confirm(`「${c.name}」と中の種目を全部削除する？`))return;
      const ids=items.filter(i=>i.cat===c.id).map(i=>i.id);
      if(ids.length)await db.from(TABLE).delete().in("id",ids);
      await db.from(TABLE).delete().eq("id",c.id);
      if(selCat===c.id)selCat=null;
      await loadAll();renderManage();};
    row.appendChild(del);cm.appendChild(row);
  });
  // 小項目追加のプルダウン
  const pick=$("item-cat-pick");pick.innerHTML="";
  cats.forEach(c=>{const o=document.createElement("option");o.value=c.id;o.textContent=c.name;pick.appendChild(o);});
  // 種別一覧（大項目ごと）
  const im=$("item-manage");im.innerHTML="";
  cats.forEach(c=>{
    const head=document.createElement("div");head.className="card-label";head.style.cssText="margin:12px 0 6px;color:var(--text2);";head.textContent=c.name;im.appendChild(head);
    items.filter(i=>i.cat===c.id).forEach(it=>{
      const row=document.createElement("div");row.className="manage-row";
      row.innerHTML=`<div style="flex:1;min-width:0;"><div style="font-size:14px;">${esc(it.name)}</div>${it.tip?`<div style="font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4;">💡 ${esc(it.tip)}</div>`:""}</div>`;
      const edit=document.createElement("button");edit.className="edit-btn";edit.textContent="助言";
      edit.onclick=()=>editTip(it.id);
      const del=document.createElement("button");del.className="del-btn";del.textContent="削除";
      del.onclick=async()=>{if(!confirm(`「${it.name}」を削除する？`))return;await db.from(TABLE).delete().eq("id",it.id);if(selItem===it.id)selItem=null;await loadAll();renderManage();};
      row.appendChild(edit);row.appendChild(del);im.appendChild(row);
    });
  });
  renderRoutineBuilder();
}

// ルーティン作成UI
function renderRoutineBuilder(){
  // 種目ピッカー（タップで順番に追加）
  const pk=$("routine-picker");pk.innerHTML="";
  items.forEach(it=>{
    const b=document.createElement("button");
    const idx=routineDraft.indexOf(it.id);
    b.className="ex-btn"+(idx>=0?" selected":"");
    b.textContent=(idx>=0?`${idx+1}. `:"")+it.name;
    b.onclick=()=>{const p=routineDraft.indexOf(it.id);if(p>=0)routineDraft.splice(p,1);else routineDraft.push(it.id);renderRoutineBuilder();};
    pk.appendChild(b);
  });
  // 並び順表示
  const ord=$("routine-order");
  ord.innerHTML=routineDraft.length?("▶ "+routineDraft.map((iid,n)=>`${n+1}.${esc(items.find(i=>i.id===iid)?.name||"?")}`).join(" → ")):'<span style="color:var(--text3);">種目をタップで追加</span>';
  // 保存済みルーティン一覧
  const list=$("routine-list");list.innerHTML="";
  if(!routines.length){list.innerHTML='<div style="font-size:12px;color:var(--text3);">まだルーティンがないよ</div>';}
  routines.forEach(r=>{
    const row=document.createElement("div");row.className="manage-row";
    const names=r.items.map(iid=>items.find(i=>i.id===iid)?.name).filter(Boolean).join(" → ");
    row.innerHTML=`<div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:600;">🔁 ${esc(r.name)}</div><div style="font-size:11px;color:var(--text2);margin-top:3px;line-height:1.4;">${esc(names)}</div>${r.note?`<div style="font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4;">📖 ${esc(r.note)}</div>`:""}</div>`;
    const del=document.createElement("button");del.className="del-btn";del.textContent="削除";
    del.onclick=async()=>{if(!confirm(`ルーティン「${r.name}」を削除する？`))return;await db.from(TABLE).delete().eq("id",r.id);await loadAll();renderManage();};
    row.appendChild(del);list.appendChild(row);
  });
}
async function saveRoutine(){
  const name=$("new-routine-name").value.trim();
  if(!name){toast("ルーティン名を入れてね");return;}
  if(!routineDraft.length){toast("種目を1つ以上選んでね");return;}
  const note=$("new-routine-note").value.trim();
  await db.from(TABLE).insert({type:"routine",data:{name,items:routineDraft.slice(),note}});
  $("new-routine-name").value="";$("new-routine-note").value="";routineDraft=[];
  await loadAll();renderManage();toast("ルーティンを保存したよ🔁");
}
async function addCat(){
  const name=$("new-cat").value.trim();if(!name){toast("名前を入れてね");return;}
  const maxOrder=cats.reduce((m,c)=>Math.max(m,c.order),0);
  await db.from(TABLE).insert({type:"category",data:{name,order:maxOrder+1}});
  $("new-cat").value="";await loadAll();renderManage();toast("追加したよ");
}
async function addItem(){
  const name=$("new-item").value.trim();const catId=Number($("item-cat-pick").value);const tip=$("new-item-tip").value.trim();
  if(!name){toast("名前を入れてね");return;}if(!catId){toast("大項目を選んでね");return;}
  await db.from(TABLE).insert({type:"item",data:{cat:catId,name,tip}});
  $("new-item").value="";$("new-item-tip").value="";await loadAll();renderManage();toast("追加したよ");
}
async function editTip(id){
  const it=items.find(i=>i.id===id);if(!it)return;
  const v=prompt(`「${it.name}」のワンポイント`,it.tip||"");
  if(v===null)return;
  await db.from(TABLE).update({data:{cat:it.cat,name:it.name,tip:v.trim()}}).eq("id",id);
  await loadAll();renderManage();toast("更新したよ");
}

// ---------- 起動 ----------
setHeaderDate();
loadAll();

// PWA: Service Worker登録
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});});
}
</script>
